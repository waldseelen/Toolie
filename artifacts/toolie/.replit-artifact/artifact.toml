kind = "web"
previewPath = "/"
title = "Toolie — Retro Araç Kataloğu"
version = "1.0.0"
id = "artifacts/toolie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19686

[services.development]
run = "pnpm --filter @workspace/toolie run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/toolie", "run", "build" ]
publicDir = "artifacts/toolie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19686"
BASE_PATH = "/"
